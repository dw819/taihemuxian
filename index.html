<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>泰禾木线 · 画框木线</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-page: #f8f5f0;
        --bg-card: #fffef9;
        --wood-dark: #5c4a3d;
        --wood-mid: #8b7355;
        --wood-light: #c4a77d;
        --accent: #7d6b52;
        --text: #3d3429;
        --text-muted: #6b5d4d;
        --shadow: 0 4px 20px rgba(92, 74, 61, 0.12);
        --shadow-hover: 0 8px 28px rgba(92, 74, 61, 0.18);
        --radius: 12px;
        --radius-sm: 8px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Noto Serif SC", "Microsoft YaHei", serif;
        background: var(--bg-page);
        color: var(--text);
        min-height: 100vh;
        padding: 0 0 88px;
        text-align: center;
      }

      .page-wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 20px;
      }

      .brand-header {
        margin-bottom: 28px;
        padding: 16px 0;
      }

      .brand-header h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--wood-dark);
        letter-spacing: 0.08em;
      }

      .image-container {
        width: 100%;
        margin-bottom: 28px;
        overflow: hidden;
        background: var(--bg-card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 12px;
        border: 1px solid rgba(139, 115, 85, 0.15);
      }

      .main-image {
        width: 100%;
        max-height: 380px;
        object-fit: cover;
        border-radius: var(--radius-sm);
      }

      .buttons-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .button {
        width: 100%;
        max-width: 320px;
        padding: 16px 20px;
        background: linear-gradient(180deg, #fffef9 0%, #f5f0e8 100%);
        color: var(--wood-dark);
        border: 1px solid rgba(139, 115, 85, 0.35);
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 15px;
        font-family: inherit;
        text-align: center;
        box-shadow: var(--shadow);
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      }

      .button:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-hover);
        border-color: var(--wood-light);
      }

      .button:active {
        transform: translateY(0);
      }

      .button-row {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 16px;
        width: 100%;
        margin-bottom: 16px;
      }

      .image-grid {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
      }

      .detail-image {
        width: 45%;
        border-radius: var(--radius-sm);
      }

      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--bg-card);
        padding: 16px 20px;
        display: flex;
        justify-content: center;
        gap: 16px;
        box-shadow: 0 -4px 24px rgba(92, 74, 61, 0.1);
        border-top: 1px solid rgba(139, 115, 85, 0.12);
      }

      .nav-button {
        padding: 12px 36px;
        background: var(--wood-dark);
        color: #fffef9;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 14px;
        font-family: inherit;
        transition: background 0.2s ease, transform 0.1s ease;
      }

      .nav-button:hover {
        background: var(--wood-mid);
      }

      .nav-button:active {
        transform: scale(0.98);
      }

      #loading-status {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 12px;
        min-height: 20px;
      }

      .image-grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        width: 100%;
        padding: 8px 0;
        justify-items: center;
      }

      @media (min-width: 1024px) {
        .image-grid-container {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      @media (max-width: 1023px) and (min-width: 768px) {
        .image-grid-container {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (max-width: 767px) {
        .image-grid-container {
          grid-template-columns: repeat(2, 1fr);
          gap: 12px;
        }
      }

      .grid-image {
        width: 100%;
        max-width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: var(--radius-sm);
        transition: box-shadow 0.3s ease, transform 0.25s ease, filter 0.25s ease;
        cursor: pointer;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        opacity: 0;
        transform: scale(0.92);
        background: #f0ebe3;
        border: 1px solid rgba(139, 115, 85, 0.12);
      }

      .grid-image:hover {
        box-shadow: var(--shadow-hover);
        transform: scale(1.02);
        filter: brightness(1.02);
      }

      .grid-image.loaded {
        opacity: 1;
        transform: scale(1);
        transition: opacity 0.35s ease, transform 0.35s ease;
      }

      .fullscreen {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(45, 38, 32, 0.94);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        cursor: pointer;
      }

      .fullscreen img {
        max-width: 90%;
        max-height: 90%;
        border-radius: var(--radius-sm);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        pointer-events: none;
      }

      .image-button {
        border: none;
        background: var(--bg-card);
        padding: 12px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        border-radius: var(--radius);
        border: 1px solid rgba(139, 115, 85, 0.2);
        box-shadow: var(--shadow);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .image-button:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-hover);
      }

      .image-button img {
        width: 140px;
        height: auto;
        border-radius: var(--radius-sm);
        display: block;
        transition: filter 0.2s ease;
      }

      .image-button:hover img {
        filter: brightness(1.05);
      }

      .model-label {
        font-size: 13px;
        color: var(--wood-dark);
        text-align: center;
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div class="page-wrap">
      <header class="brand-header">
        <h1>泰禾木线 · 画框木线</h1>
      </header>

      <div class="image-container">
        <img
          src="https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/THshangbiao.jpg"
          class="main-image"
          alt="泰禾木线"
        />
      </div>

      <div id="buttons-container" class="buttons-container"></div>

      <div id="loading-status" class="loading-status"></div>
    </div>

    <nav class="bottom-nav">
      <button class="nav-button" onclick="loadHomePage()">首页</button>
      <button class="nav-button" onclick="goBack()">返回</button>
    </nav>

    <script src="https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/imageCounts.js"></script>
    <script>
      // 将嵌套的函数和变量移到全局作用域
      let currentPage = "home";
      let currentSeriesKey = null; // 'TC' | 'TF' | 'TH' | 'Brazil'，用于历史恢复
      let lazyObserver = null;
      let currentDetailInfo = null;
      let isRestoringFromHistory = false; // 从浏览器后退恢复时不 pushState

      // 将 sizeToModels 和 detailImages 移到全局作用域
      const sizeToModels = {
        //TC 系列
        "20-25mm": [
          "TC02",
          "TC10321",
          "TC107",
          "TC20623",
          "TC20725",
          "TC2112015",
          "TC2113520",
          "TC21823",
          "TC219",
          "TC23521",
          "TC2462020",
          "TC29324",
          "TC60525",
          "TC61223",
          "TC6123520",
        ],
        "30-40mm": [
          "TC20730",
          "TC21130",
          "TC2113025",
          "TC21828",
          "TC21835",
          "TC21836",
          "TC24630",
          "TC6123025",
          "TC6123030",
          "TC6123038",
          "TC61233",
          "TC6123538",
          "TC84335",
        ],
        "43mm": ["TC20643", "TC20743", "TC28143", "TC84343"],
        "48mm": ["TC22948", "TC6122248", "TC6123048", "TC6123548"],
        TC50mm以上: [
          "TC22060",
          "TC84356",
          "TC84358",
          "TC84375",
          "TC2073560",
          "TC2073575",
          "TC6123558",
          "TC6123570",
        ],
        //TF 系列
        "25-35mm": [
          "TF219",
          "TF20732",
          "TF21832",
          "TF21836",
          "TF24636",
          "TF84335",
          "TF6122436",
          "TF6123025",
          "TF6123525",
        ],
        "40-45mm": ["TF20744", "TF22040", "TF28144", "TF84344"],
        TF50mm以上: ["TF22060", "TF6122450", "TF6122460"],
      };

      // 动态生成图片 URL 的函数
      function generateImageUrls(series, size, model) {
        const baseUrl = `https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/muxian/${series}/${size}/${model}/`;
        const count = imageCounts[model];
        return Array.from(
          { length: count },
          (_, i) => `${baseUrl}${i + 1}.jpg`
        );
      }

      // 历史状态：只存可序列化数据，便于浏览器后退恢复
      function manageHistory(action) {
        if (action === "push" && !isRestoringFromHistory) {
          history.pushState(
            {
              page: currentPage,
              seriesKey: currentSeriesKey,
              detailInfo: currentDetailInfo,
            },
            "",
            ""
          );
        }
      }

      function loadHomePage() {
        let buttonsContainer = document.getElementById("buttons-container");
        let mainImage = document.querySelector(".main-image");
        const statusEl = document.getElementById("loading-status");
        if (statusEl) statusEl.textContent = "";

        currentPage = "home";
        currentSeriesKey = null;
        currentDetailInfo = null;

        buttonsContainer.innerHTML = `
                <button class="button" onclick="showTCSeries()">TC实木涂油线系列</button>
                <button class="button" onclick="showTFSeries()">TF石膏线 不涂底</button>
                <button class="button" onclick="showTHSeries()">TH石膏线系列</button>
                <button class="button" onclick="showBrazilSeries()">巴西白木木线系列</button>
              `;

        mainImage.src =
          "https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/THshangbiao.jpg";
        mainImage.style.display = "block";

        manageHistory("push");
      }

      // 修改后的 showTCDetail 函数 - 添加型号选择层
      function showTCDetail(size) {
        if (sizeToModels[size] && sizeToModels[size].length > 0) {
          showModelSelection("TC", size);
        } else {
          showSizeDetail("TC", size);
        }
      }

      // 添加 showSizeDetail 函数（替代原来的 showDetail）
      function showSizeDetail(series, size) {
        const baseUrl = `https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/muxian/${series}/${size}/`;
        // 获取尺寸级别的图片数量
        const countKey = size.replace(/-/g, "").replace("以上", "");
        const count =
          imageCounts[countKey] || imageCounts[`${series}${countKey}`] || 10;
        const images = Array.from(
          { length: count },
          (_, i) => `${baseUrl}${i + 1}.jpg`
        );

        showDetailWithImages(images);
        currentDetailInfo = { series, size };
        manageHistory("push");
      }

      // 添加 showTFDetail 函数（与 TC 系列一致）
      function showTFDetail(size) {
        if (sizeToModels[size] && sizeToModels[size].length > 0) {
          showModelSelection("TF", size);
        } else {
          showSizeDetail("TF", size);
        }
      }

      // 新增函数：展示型号选择界面
      function showModelSelection(series, size) {
        const statusEl = document.getElementById("loading-status");
        if (statusEl) statusEl.textContent = "";

        let buttonsContainer = document.getElementById("buttons-container");
        let mainImage = document.querySelector(".main-image");

        currentPage = "modelSelection";
        currentDetailInfo = { series, size };

        const models = sizeToModels[size];

        let buttonsHTML = models.map((model) => {
          // 动态生成第一张图片的 URL
          const imgSrc = `https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/muxian/${series}/${size}/${model}/1.jpg`;

          return `
            <button class="image-button" onclick="showModelDetail('${series}', '${size}', '${model}')">
              <img src="${imgSrc}" alt="${model}" />
              <div class="model-label">${model}</div>
            </button>
          `;
        });

        // 每行两个按钮
        let rowsHTML = "";
        for (let i = 0; i < buttonsHTML.length; i += 2) {
          rowsHTML += `<div class="button-row">
            ${buttonsHTML[i]}
            ${buttonsHTML[i + 1] || ""}
          </div>`;
        }

        buttonsContainer.innerHTML = rowsHTML;
        mainImage.style.display = "block";

        manageHistory("push");
      }

      function initLazyObserver() {
        if (lazyObserver) {
          lazyObserver.disconnect();
        }

        lazyObserver = new IntersectionObserver(
          (entries, observer) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                const img = entry.target;
                const src = img.dataset.src;

                img.src = src;

                img.onload = () => {
                  img.classList.add("loaded");
                  updateLoadingStatus();
                };

                observer.unobserve(img);
              }
            });
          },
          {
            rootMargin: "0px 0px 100px 0px",
            threshold: 0.01,
          }
        );
      }

      function updateLoadingStatus() {
        const container = document.querySelector(".image-grid-container");
        if (!container) return;

        const totalImages = container.querySelectorAll("img").length;
        const loadedImages = container.querySelectorAll("img.loaded").length;

        const statusEl = document.getElementById("loading-status");
        if (statusEl) {
          if (loadedImages === totalImages) {
            statusEl.textContent = "所有图片已加载完成";
            statusEl.style.transition = "opacity 0.4s ease";
            setTimeout(() => {
              statusEl.style.opacity = "0";
              setTimeout(() => {
                statusEl.textContent = "";
                statusEl.style.opacity = "1";
              }, 500);
            }, 2000);
          } else {
            statusEl.textContent = `图片加载中: ${loadedImages}/${totalImages}`;
          }
        }
      }

      // 新增函数：展示具体型号的图片
      function showModelDetail(series, size, model) {
        const baseUrl = `https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/muxian/${series}/${size}/${model}`;

        // 使用 imageCounts.js 中的数量数据
        const count = imageCounts[model] || 10;

        // 动态生成图片 URL 数组
        const images = Array.from(
          { length: count },
          (_, i) => `${baseUrl}/${i + 1}.jpg`
        );

        showDetailWithImages(images);
        currentDetailInfo = { series, size, model };
        manageHistory("push");
      }

      function showDetailWithImages(images) {
        const buttonsContainer = document.getElementById("buttons-container");
        const mainImage = document.querySelector(".main-image");

        currentPage = "detail";
        mainImage.style.display = "none";

        buttonsContainer.innerHTML = `
          <div class="image-grid-container">
            ${images
              .map(
                (imgSrc) =>
                  `<img data-src="${imgSrc}" class="grid-image" onclick="openFullScreen(this)">`
              )
              .join("")}
          </div>
        `;

        initLazyObserver();

        document.querySelectorAll(".grid-image").forEach((img) => {
          img.onload = () => {
            img.classList.add("loaded");
            updateLoadingStatus();
          };
          img.onerror = () => {
            img.style.visibility = "hidden";
            img.alt = "加载失败";
          };
          lazyObserver.observe(img);
        });

        updateLoadingStatus();
      }

      function showSeries(seriesName, imageUrl, sizes, detailFunction, seriesKey) {
        let buttonsContainer = document.getElementById("buttons-container");
        let mainImage = document.querySelector(".main-image");
        const statusEl = document.getElementById("loading-status");
        if (statusEl) statusEl.textContent = "";

        currentPage = "series";
        currentSeriesKey = seriesKey;

        let buttonsHTML = sizes.map(
          (size) =>
            `<button class="button" onclick="window.${detailFunction}('${size}')">${size}</button>`
        );

        let rowsHTML = "";
        for (let i = 0; i < buttonsHTML.length; i += 2) {
          rowsHTML += `<div class="button-row">
                          ${buttonsHTML[i]}
                          ${buttonsHTML[i + 1] ? buttonsHTML[i + 1] : ""}
                      </div>`;
        }

        buttonsContainer.innerHTML = rowsHTML;
        mainImage.src = imageUrl;
        mainImage.style.display = "block";
        manageHistory("push");
      }

      function showTHSeries() {
        showSeries(
          "TH 石膏线系列",
          "https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/THshimu.jpg",
          ["32mm", "36mm", "44mm", "50mm", "60mm", "80mm"],
          "showTHDetail",
          "TH"
        );
      }

      function showTCSeries() {
        showSeries(
          "TC 实木涂油线系列",
          "https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/TCshimu.jpg",
          ["20-25mm", "30-40mm", "43mm", "48mm", "TC50mm以上"],
          "showTCDetail",
          "TC"
        );
      }

      function showTFSeries() {
        showSeries(
          "TF 石膏线",
          "https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/TFshigao.jpg",
          ["25-35mm", "40-45mm", "TF50mm以上"],
          "showTFDetail",
          "TF"
        );
      }

      function showBrazilSeries() {
        showSeries(
          "巴西白木木线",
          "https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/baxibaimu.jpg",
          ["20mm", "25mm", "30mm", "35mm", "36mm"],
          "showBrazilDetail",
          "Brazil"
        );
      }

      // 根据 seriesKey 恢复系列选择页（不 push 新历史）
      function restoreSeriesPage(seriesKey) {
        const map = {
          TC: showTCSeries,
          TF: showTFSeries,
          TH: showTHSeries,
          Brazil: showBrazilSeries,
        };
        if (map[seriesKey]) map[seriesKey]();
        else loadHomePage();
      }

      window.addEventListener("popstate", function (event) {
        isRestoringFromHistory = true;
        try {
          if (!event.state) {
            loadHomePage();
            return;
          }
          currentPage = event.state.page || "home";
          currentSeriesKey = event.state.seriesKey ?? null;
          currentDetailInfo = event.state.detailInfo || null;

          if (currentPage === "series" && currentSeriesKey) {
            restoreSeriesPage(currentSeriesKey);
          } else if (currentPage === "modelSelection" && currentDetailInfo?.series != null && currentDetailInfo?.size != null) {
            showModelSelection(currentDetailInfo.series, currentDetailInfo.size);
          } else if (currentPage === "detail" && currentDetailInfo) {
            if (currentDetailInfo.model) {
              showModelDetail(
                currentDetailInfo.series,
                currentDetailInfo.size,
                currentDetailInfo.model
              );
            } else if (currentDetailInfo.series != null && currentDetailInfo.size != null) {
              showSizeDetail(currentDetailInfo.series, currentDetailInfo.size);
            } else {
              loadHomePage();
            }
          } else {
            loadHomePage();
          }
        } finally {
          isRestoringFromHistory = false;
        }
      });

      // 返回：与浏览器后退一致，避免状态不同步
      function goBack() {
        if (history.length > 1) {
          history.back();
        } else {
          loadHomePage();
        }
      }

      function openFullScreen(img) {
        let fullScreenDiv = document.createElement("div");
        fullScreenDiv.classList.add("fullscreen");
        fullScreenDiv.onclick = function () {
          document.body.removeChild(fullScreenDiv);
        };

        let fullScreenImg = document.createElement("img");
        fullScreenImg.src = img.src;
        fullScreenImg.style.maxWidth = "90%";
        fullScreenImg.style.maxHeight = "90%";
        fullScreenImg.style.borderRadius = "8px";

        fullScreenDiv.appendChild(fullScreenImg);
        document.body.appendChild(fullScreenDiv);
      }

      function showTHDetail(size) {
        if (sizeToModels[size] && sizeToModels[size].length > 0) {
          showModelSelection("TH", size);
        } else {
          showSizeDetail("TH", size);
        }
      }

      function showBrazilDetail(size) {
        if (sizeToModels[size] && sizeToModels[size].length > 0) {
          showModelSelection("巴西白木", size);
        } else {
          showSizeDetail("巴西白木", size);
        }
      }

      loadHomePage();
    </script>
  </body>
</html>
