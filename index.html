<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>泰禾木线</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        padding: 20px;
        padding-bottom: 80px;
        text-align: center;
      }

      .image-container {
        width: 100%;
        margin-bottom: 20px;
        overflow: hidden;
      }

      .main-image {
        width: 100%;
        max-height: 400px;
        object-fit: cover;
        border-radius: 10px;
      }

      .buttons-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .button {
        width: 80%;
        max-width: 300px;
        padding: 15px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        text-align: center;
      }

      .button:hover {
        background-color: #45a049;
      }

      .button-row {
        display: flex;
        justify-content: center;
        gap: 30px;
        width: 100%;
      }

      .image-grid {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
      }

      .detail-image {
        width: 45%;
        border-radius: 8px;
      }

      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: #f1f1f1;
        padding: 15px;
        display: flex;
        justify-content: space-around;
      }

      .nav-button {
        padding: 10px 30px;
        background-color: #555;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      /* 新增的响应式网格样式 */
      .image-grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(225px, 1fr));
        gap: 10px;
        width: 100%;
        padding: 10px;
        justify-items: center;
      }

      /* 电脑端：每行最多 4 张 */
      @media (min-width: 1024px) {
        .image-grid-container {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      /* 平板端：每行 3 张 */
      @media (max-width: 1023px) and (min-width: 768px) {
        .image-grid-container {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      /* 手机端：每行至少 2 张 */
      @media (max-width: 767px) {
        .image-grid-container {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      .grid-image {
        width: 100%;
        max-width: 475px;
        border-radius: 8px;
        transition: box-shadow 0.3s ease-in-out, filter 0.3s ease-in-out;
        cursor: pointer;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        opacity: 0;
        transform: scale(0.8);
        background: #f5f5f5;
      }

      .grid-image:hover {
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        filter: brightness(0.8);
      }

      .grid-image.loaded {
        opacity: 1;
        transform: scale(1);
        transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
      }

      .fullscreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .fullscreen img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 8px;
      }

      .image-button {
        border: none;
        background: none;
        padding: 0;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .image-button img {
        width: 140px;
        height: auto;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s;
      }

      .image-button img:hover {
        transform: scale(1.05);
      }

      .model-label {
        font-size: 14px;
        color: #333;
        text-align: center;
      }

      .button-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
      }
    </style>
  </head>

  <body>
    <div class="image-container">
      <img
        src="https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/THshangbiao.jpg"
        class="main-image"
      />
    </div>

    <div id="buttons-container" class="buttons-container"></div>

    <div id="loading-status" class="loading-status"></div>

    <div class="bottom-nav">
      <button class="nav-button" onclick="loadHomePage()">首页</button>
      <button class="nav-button" onclick="goBack()">返回</button>
    </div>

    <script src="https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/imageCounts.js"></script>
    <script>
      // 将嵌套的函数和变量移到全局作用域
      let currentPage = "home";
      let lastSeriesFunction = null;
      let isFirstLoad = true;
      let lazyObserver = null;
      let currentSeriesArgs = null;
      let currentDetailInfo = null;

      // 将 sizeToModels 和 detailImages 移到全局作用域
      const sizeToModels = {
        //TC 系列
        "20-25mm": [
          "TC02",
          "TC10321",
          "TC107",
          "TC20623",
          "TC20725",
          "TC2112015",
          "TC2113520",
          "TC21823",
          "TC219",
          "TC23521",
          "TC2462020",
          "TC29324",
          "TC60525",
          "TC61223",
          "TC6123520",
        ],
        "30-40mm": [
          "TC20730",
          "TC21130",
          "TC2113025",
          "TC21828",
          "TC21835",
          "TC21836",
          "TC24630",
          "TC6123025",
          "TC6123030",
          "TC6123038",
          "TC61233",
          "TC6123538",
          "TC84335",
        ],
        "43mm": ["TC20643", "TC20743", "TC28143", "TC84343"],
        "48mm": ["TC22948", "TC6122248", "TC6123048", "TC6123548"],
        TC50mm以上: [
          "TC22060",
          "TC84356",
          "TC84358",
          "TC84375",
          "TC2073560",
          "TC2073575",
          "TC6123558",
          "TC6123570",
        ],
        //TF 系列
        "25-35mm": [
          "TF219",
          "TF20732",
          "TF21832",
          "TF21836",
          "TF24636",
          "TF84335",
          "TF6122436",
          "TF6123025",
          "TF6123525",
        ],
        "40-45mm": ["TF20744", "TF22040", "TF28144", "TF84344"],
        TF50mm以上: ["TF22060", "TF6122450", "TF6122460"],
      };

      // 动态生成图片 URL 的函数
      function generateImageUrls(series, size, model) {
        const baseUrl = `https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/muxian/${series}/${size}/${model}/`;
        const count = imageCounts[model];
        return Array.from(
          { length: count },
          (_, i) => `${baseUrl}${i + 1}.jpg`
        );
      }

      // 修改历史状态管理
      function manageHistory(action) {
        if (action === "push") {
          history.pushState(
            {
              page: currentPage,
              lastSeries: lastSeriesFunction?.toString(),
              seriesArgs: currentSeriesArgs,
              detailInfo: currentDetailInfo,
            },
            ""
          );
        }
      }

      function loadHomePage() {
        let buttonsContainer = document.getElementById("buttons-container");
        let mainImage = document.querySelector(".main-image");
        const statusEl = document.getElementById("loading-status");
        if (statusEl) statusEl.remove();

        currentPage = "home";
        lastSeriesFunction = null;
        currentDetailInfo = null;

        buttonsContainer.innerHTML = `
                <button class="button" onclick="showTCSeries()">TC实木涂油线系列</button>
                <button class="button" onclick="showTFSeries()">TF石膏线 不涂底</button>
                <button class="button" onclick="showTHSeries()">TH石膏线系列</button>
                <button class="button" onclick="showBrazilSeries()">巴西白木木线系列</button>
              `;

        mainImage.src =
          "https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/THshangbiao.jpg";
        mainImage.style.display = "block";

        manageHistory("push");
      }

      // 修改后的 showTCDetail 函数 - 添加型号选择层
      function showTCDetail(size) {
        if (sizeToModels[size] && sizeToModels[size].length > 0) {
          showModelSelection("TC", size);
        } else {
          showSizeDetail("TC", size);
        }
      }

      // 添加 showSizeDetail 函数（替代原来的 showDetail）
      function showSizeDetail(series, size) {
        const baseUrl = `https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/muxian/${series}/${size}/`;
        // 获取尺寸级别的图片数量
        const countKey = size.replace(/-/g, "").replace("以上", "");
        const count =
          imageCounts[countKey] || imageCounts[`${series}${countKey}`] || 10;
        const images = Array.from(
          { length: count },
          (_, i) => `${baseUrl}${i + 1}.jpg`
        );

        showDetailWithImages(images);
        currentDetailInfo = { series, size };
        manageHistory("push");
      }

      // 添加 showTFDetail 函数（与 TC 系列一致）
      function showTFDetail(size) {
        if (sizeToModels[size] && sizeToModels[size].length > 0) {
          showModelSelection("TF", size);
        } else {
          showSizeDetail("TF", size);
        }
      }

      // 新增函数：展示型号选择界面
      function showModelSelection(series, size) {
        const statusEl = document.getElementById("loading-status");
        if (statusEl) statusEl.textContent = "加载型号列表...";

        let buttonsContainer = document.getElementById("buttons-container");
        let mainImage = document.querySelector(".main-image");

        currentPage = "modelSelection";
        currentDetailInfo = { series, size };

        const models = sizeToModels[size];

        let buttonsHTML = models.map((model) => {
          // 动态生成第一张图片的 URL
          const imgSrc = `https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/muxian/${series}/${size}/${model}/1.jpg`;

          return `
            <button class="image-button" onclick="showModelDetail('${series}', '${size}', '${model}')">
              <img src="${imgSrc}" alt="${model}" />
              <div class="model-label">${model}</div>
            </button>
          `;
        });

        // 每行两个按钮
        let rowsHTML = "";
        for (let i = 0; i < buttonsHTML.length; i += 2) {
          rowsHTML += `<div class="button-row">
            ${buttonsHTML[i]}
            ${buttonsHTML[i + 1] || ""}
          </div>`;
        }

        buttonsContainer.innerHTML = rowsHTML;
        mainImage.style.display = "block";

        manageHistory("push");
      }

      function initLazyObserver() {
        if (lazyObserver) {
          lazyObserver.disconnect();
        }

        lazyObserver = new IntersectionObserver(
          (entries, observer) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                const img = entry.target;
                const src = img.dataset.src;

                img.src = src;

                img.onload = () => {
                  img.classList.add("loaded");
                  updateLoadingStatus();
                };

                observer.unobserve(img);
              }
            });
          },
          {
            rootMargin: "0px 0px 100px 0px",
            threshold: 0.01,
          }
        );
      }

      function updateLoadingStatus() {
        const container = document.querySelector(".image-grid-container");
        if (!container) return;

        const totalImages = container.querySelectorAll("img").length;
        const loadedImages = container.querySelectorAll("img.loaded").length;

        const statusEl = document.getElementById("loading-status");
        if (statusEl) {
          if (loadedImages === totalImages) {
            statusEl.textContent = "所有图片已加载完成";
            setTimeout(() => {
              statusEl.style.opacity = "0";
              setTimeout(() => statusEl.remove(), 500);
            }, 2000);
          } else {
            statusEl.textContent = `图片加载中: ${loadedImages}/${totalImages}`;
          }
        }
      }

      // 新增函数：展示具体型号的图片
      function showModelDetail(series, size, model) {
        const baseUrl = `https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/muxian/${series}/${size}/${model}`;

        // 使用 imageCounts.js 中的数量数据
        const count = imageCounts[model] || 10;

        // 动态生成图片 URL 数组
        const images = Array.from(
          { length: count },
          (_, i) => `${baseUrl}/${i + 1}.jpg`
        );

        showDetailWithImages(images);
        currentDetailInfo = { series, size, model };
        manageHistory("push");
      }

      function showDetailWithImages(images) {
        const buttonsContainer = document.getElementById("buttons-container");
        const mainImage = document.querySelector(".main-image");

        currentPage = "detail";
        mainImage.style.display = "none";

        buttonsContainer.innerHTML = `
          <div class="image-grid-container">
            ${images
              .map(
                (imgSrc) =>
                  `<img data-src="${imgSrc}" class="grid-image" onclick="openFullScreen(this)">`
              )
              .join("")}
          </div>
        `;

        initLazyObserver();

        document.querySelectorAll(".grid-image").forEach((img) => {
          img.onload = () => {
            img.classList.add("loaded");
            updateLoadingStatus();
          };
          img.onerror = () => {
            img.src = "default.jpg";
          };
          lazyObserver.observe(img);
        });

        updateLoadingStatus();
      }

      // 将嵌套在 showDetail 中的函数移到全局作用域
      function showSeries(seriesName, imageUrl, sizes, detailFunction) {
        let buttonsContainer = document.getElementById("buttons-container");
        let mainImage = document.querySelector(".main-image");
        const statusEl = document.getElementById("loading-status");
        if (statusEl) statusEl.remove();

        currentPage = "series";
        lastSeriesFunction = () =>
          showSeries(seriesName, imageUrl, sizes, detailFunction);

        let buttonsHTML = sizes.map(
          (size) =>
            `<button class="button" onclick="window.${detailFunction}('${size}')">${size}</button>`
        );

        let rowsHTML = "";
        for (let i = 0; i < buttonsHTML.length; i += 2) {
          rowsHTML += `<div class="button-row">
                          ${buttonsHTML[i]}
                          ${buttonsHTML[i + 1] ? buttonsHTML[i + 1] : ""}
                      </div>`;
        }

        buttonsContainer.innerHTML = rowsHTML;
        mainImage.src = imageUrl;
        mainImage.style.display = "block";
        manageHistory("push");
      }

      function showTHSeries() {
        showSeries(
          "TH 石膏线系列",
          "https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/THshimu.jpg",
          ["32mm", "36mm", "44mm", "50mm", "60mm", "80mm"],
          "showTHDetail"
        );
      }

      function showTCSeries() {
        showSeries(
          "TC 实木涂油线系列",
          "https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/TCshimu.jpg",
          ["20-25mm", "30-40mm", "43mm", "48mm", "TC50mm以上"],
          "showTCDetail"
        );
      }

      function showTFSeries() {
        showSeries(
          "TF 石膏线",
          "https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/TFshigao.jpg",
          ["25-35mm", "40-45mm", "TF50mm以上"],
          "showTFDetail"
        );
      }

      function showBrazilSeries() {
        showSeries(
          "巴西白木木线",
          "https://thmuxian.oss-cn-guangzhou.aliyuncs.com/THmuxian/docs/baxibaimu.jpg",
          ["20mm", "25mm", "30mm", "35mm", "36mm"],
          "showBrazilDetail"
        );
      }

      // 修改popstate事件处理
      window.addEventListener("popstate", function (event) {
        if (event.state) {
          currentPage = event.state.page || "home";

          if (event.state.lastSeries) {
            try {
              lastSeriesFunction = new Function(
                "return " + event.state.lastSeries
              )();
            } catch (e) {
              console.error("Error restoring function:", e);
            }
          }

          currentSeriesArgs = event.state.seriesArgs || null;
          currentDetailInfo = event.state.detailInfo || null;

          if (currentPage === "series" && lastSeriesFunction) {
            lastSeriesFunction();
          } else if (currentPage === "modelSelection" && currentDetailInfo) {
            showModelSelection(
              currentDetailInfo.series,
              currentDetailInfo.size
            );
          } else if (currentPage === "detail" && currentDetailInfo) {
            if (currentDetailInfo.model) {
              showModelDetail(
                currentDetailInfo.series,
                currentDetailInfo.size,
                currentDetailInfo.model
              );
            } else {
              showSizeDetail(currentDetailInfo.series, currentDetailInfo.size);
            }
          } else {
            loadHomePage();
          }
        }
      });

      // 修改返回按钮功能
      function goBack() {
        if (currentPage === "detail" && currentDetailInfo?.model) {
          showModelSelection(currentDetailInfo.series, currentDetailInfo.size);
        } else if (currentPage === "detail") {
          if (lastSeriesFunction) {
            lastSeriesFunction();
          } else {
            loadHomePage();
          }
        } else if (currentPage === "modelSelection") {
          if (lastSeriesFunction) {
            lastSeriesFunction();
          } else {
            loadHomePage();
          }
        } else if (currentPage === "series") {
          loadHomePage();
        } else {
          loadHomePage();
        }
      }

      function openFullScreen(img) {
        let fullScreenDiv = document.createElement("div");
        fullScreenDiv.classList.add("fullscreen");
        fullScreenDiv.onclick = function () {
          document.body.removeChild(fullScreenDiv);
        };

        let fullScreenImg = document.createElement("img");
        fullScreenImg.src = img.src;
        fullScreenImg.style.maxWidth = "90%";
        fullScreenImg.style.maxHeight = "90%";
        fullScreenImg.style.borderRadius = "8px";

        fullScreenDiv.appendChild(fullScreenImg);
        document.body.appendChild(fullScreenDiv);
      }

      function showTHDetail(size) {
        if (sizeToModels[size] && sizeToModels[size].length > 0) {
          showModelSelection("TH", size);
        } else {
          showSizeDetail("TH", size);
        }
      }

      function showTFDetail(size) {
        if (sizeToModels[size] && sizeToModels[size].length > 0) {
          showModelSelection("TF", size);
        } else {
          showSizeDetail("TF", size);
        }
      }

      function showBrazilDetail(size) {
        if (sizeToModels[size] && sizeToModels[size].length > 0) {
          showModelSelection("巴西白木", size);
        } else {
          showSizeDetail("巴西白木", size);
        }
      }

      window.addEventListener("load", function () {
        manageHistory("push");
        isFirstLoad = false;
      });

      loadHomePage();
    </script>
  </body>
</html>
